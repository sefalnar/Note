<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملاحظاتي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #6366f1; --bg: #f3f4f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; height: 100dvh; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* واجهة الدخول */
        .auth-container { padding: 30px; max-width: 400px; margin: 80px auto; background: white; border-radius: 20px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        
        /* الواجهة الرئيسية */
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 15px; height: calc(100dvh - 60px); overflow-y: auto; }
        
        /* الملاحظة */
        .card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
        
        /* الزر العائم */
        .fab { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--p); color: white; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* النافذة المنبثقة */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display:none; justify-content: center; align-items: center; z-index: 100; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 20px; position: relative; }
        .btn { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-p { background: var(--p); color: white; }
        .btn-red { background: #fee2e2; color: #ef4444; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 25px; color: #aaa; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-section" class="auth-container">
    <h2>تسجيل الدخول</h2>
    <input type="email" id="email" placeholder="الإيميل">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button class="btn btn-p" onclick="login()">دخول</button>
    <button class="btn" onclick="signup()" style="background:none; color:var(--p)">إنشاء حساب</button>
</div>

<div id="app-section" class="hidden">
    <div class="header">
        <b>ملاحظاتي</b>
        <span onclick="logout()">خروج</span>
    </div>
    <div id="list" class="grid"></div>
    <button class="fab" onclick="showModal()">+</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeM()">&times;</span>
        <h3 id="m-title">ملاحظة جديدة</h3>
        <input type="hidden" id="edit-id">
        <img id="prev" src="" style="width:100%; height:150px; object-fit:cover; display:none; border-radius:10px; margin-bottom:10px;">
        <button id="up-btn" class="btn" onclick="document.getElementById('file').click()" style="background:#eee">📷 إضافة صورة</button>
        <input type="file" id="file" hidden onchange="upImg(this)">
        <input type="text" id="title" placeholder="العنوان">
        <textarea id="content" placeholder="التفاصيل..." rows="4"></textarea>
        <button id="save-btn" class="btn btn-p" onclick="save()">حفظ</button>
        <div id="edit-btns" class="hidden">
            <button class="btn" style="background:#dcfce7; color:#10b981" onclick="enableEdit()">تعديل</button>
            <button class="btn btn-red" onclick="del()">حذف</button>
        </div>
    </div>
</div>

<script>
    // بياناتك الخاصة
    const URL = 'https://vlygthdszwyjrhrjnbfa.supabase.co';
    const KEY = 'sb_publishable_QVnl04i66J2Go943y2z-ZA_9tGINsLv';
    const sb = supabase.createClient(URL, KEY);

    let imgUrl = "";

    // مراقبة الحساب
    sb.auth.onAuthStateChange((ev, res) => {
        if (res) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            load();
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });

    async function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
        if (error) alert(error.message);
    }

    async function signup() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        const { error } = await sb.auth.signUp({ email: e, password: p });
        if (error) alert(error.message); else alert("تأكد من إيقاف تأكيد الإيميل في Supabase");
    }

    async function logout() { await sb.auth.signOut(); }

    // الملاحظات
    async function load() {
        const { data } = await sb.from('notes').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('list');
        list.innerHTML = '';
        data?.forEach(n => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `${n.image_url ? `<img src="${n.image_url}">` : ''} <h4>${n.title}</h4>`;
            d.onclick = () => showView(n);
            list.appendChild(d);
        });
    }

    async function upImg(el) {
        if (!el.files[0]) return;
        const file = el.files[0];
        document.getElementById('up-btn').innerText = "جاري الرفع...";
        const name = Date.now() + "_" + file.name;
        const { error } = await sb.storage.from('note-images').upload(name, file);
        if (error) return alert("خطأ في الرفع");
        const { data } = sb.storage.from('note-images').getPublicUrl(name);
        imgUrl = data.publicUrl;
        document.getElementById('prev').src = imgUrl;
        document.getElementById('prev').style.display = 'block';
        document.getElementById('up-btn').innerText = "تم الرفع ✅";
    }

    function showModal() {
        clear();
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('edit-btns').classList.add('hidden');
        document.getElementById('save-btn').classList.remove('hidden');
    }

    function showView(n) {
        document.getElementById('edit-id').value = n.id;
        document.getElementById('title').value = n.title;
        document.getElementById('content').value = n.content;
        document.getElementById('title').readOnly = true;
        document.getElementById('content').readOnly = true;
        imgUrl = n.image_url || "";
        if(imgUrl) {
            document.getElementById('prev').src = imgUrl;
            document.getElementById('prev').style.display = 'block';
        } else {
            document.getElementById('prev').style.display = 'none';
        }
        document.getElementById('save-btn').classList.add('hidden');
        document.getElementById('up-btn').classList.add('hidden');
        document.getElementById('edit-btns').classList.remove('hidden');
        document.getElementById('modal').style.display = 'flex';
    }

    function enableEdit() {
        document.getElementById('title').readOnly = false;
        document.getElementById('content').readOnly = false;
        document.getElementById('save-btn').classList.remove('hidden');
        document.getElementById('up-btn').classList.remove('hidden');
        document.getElementById('edit-btns').classList.add('hidden');
    }

    async function save() {
        const id = document.getElementById('edit-id').value;
        const t = document.getElementById('title').value;
        const c = document.getElementById('content').value;
        const u = (await sb.auth.getUser()).data.user;
        const obj = { title: t, content: c, user_id: u.id, image_url: imgUrl };
        
        if (id) await sb.from('notes').update(obj).eq('id', id);
        else await sb.from('notes').insert([obj]);
        
        closeM();
        load();
    }

    async function del() {
        const id = document.getElementById('edit-id').value;
        if (confirm('حذف؟')) {
            await sb.from('notes').delete().eq('id', id);
            closeM();
            load();
        }
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function clear() {
        document.getElementById('edit-id').value = '';
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        document.getElementById('title').readOnly = false;
        document.getElementById('content').readOnly = false;
        document.getElementById('prev').style.display = 'none';
        document.getElementById('up-btn').classList.remove('hidden');
        document.getElementById('up-btn').innerText = "📷 إضافة صورة";
        imgUrl = "";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملاحظاتي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #6366f1; --bg: #f3f4f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-p { background: var(--p); color: white; }
        .hidden { display: none !important; }
        .header { background: var(--p); color: white; padding: 15px; position: fixed; top:0; left:0; width:100%; display: flex; justify-content: space-between; z-index: 10; }
        .grid { margin-top: 60px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; }
        .fab { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--p); color: white; border-radius: 50%; font-size: 30px; border: none; }
    </style>
</head>
<body>

<div id="auth-section" class="container">
    <h2 style="text-align: center;">تسجيل الدخول</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button class="btn-p" onclick="handleLogin()">دخول</button>
    <button onclick="handleSignUp()" style="background:none; color:var(--p)">إنشاء حساب جديد</button>
</div>

<div id="app-section" class="hidden">
    <div class="header">
        <b>ملاحظاتي</b>
        <span onclick="handleLogout()">خروج</span>
    </div>
    <div id="list" class="grid"></div>
    <button class="fab" onclick="alert('اضغط على الملاحظات أو أضف واحدة جديدة')">+</button>
</div>

<script>
    // التأكد من أن المكتبة تم تحميلها قبل البدء
    window.onload = function() {
        const SUPABASE_URL = 'https://vlygthdszwyjrhrjnbfa.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_QVnl04i66J2Go943y2z-ZA_9tGINsLv';
        
        // إنشاء العميل
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // جعل الوظائف متاحة عالمياً للأزرار
        window.handleLogin = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert("خطأ: " + error.message);
        };

        window.handleSignUp = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await _supabase.auth.signUp({ email, password });
            if (error) alert(error.message); else alert("افحص إيميلك أو تأكد من إيقاف تأكيد الإيميل في Supabase");
        };

        window.handleLogout = async function() {
            await _supabase.auth.signOut();
        };

        // مراقبة حالة المستخدم
        _supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                loadNotes();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('app-section').classList.add('hidden');
            }
        });

        async function loadNotes() {
            const { data } = await _supabase.from('notes').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('list');
            list.innerHTML = '';
            data?.forEach(n => {
                const d = document.createElement('div');
                d.className = 'card';
                d.innerHTML = `${n.image_url ? `<img src="${n.image_url}">` : ''} <h4>${n.title}</h4>`;
                list.appendChild(d);
            });
        }
    };
</script>
</body>
</html>
